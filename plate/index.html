<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mochi plate</title>
  <meta name="description" content="This is Mochi. They exist. On a plate.">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      color: #c8c8d0;
      padding: 2rem;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 111, 156, 0.15) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
      z-index: 0;
    }

    .home-link {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      z-index: 10;
      opacity: 0.35;
      transition: opacity 0.4s, transform 0.4s;
    }

    .home-link:hover {
      opacity: 0.85;
      transform: scale(1.08);
    }

    .home-link img {
      width: 48px;
      height: auto;
      filter: drop-shadow(0 0 12px rgba(124, 111, 156, 0.3));
    }

    .plate {
      max-width: min(500px, 90vw);
      animation: breathe 8s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    .plate img {
      width: 100%;
      height: auto;
      border-radius: 50%;
      filter: drop-shadow(0 0 50px rgba(124, 111, 156, 0.35));
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .caption {
      margin-top: 2.5rem;
      font-size: 1rem;
      font-style: italic;
      color: #7c6f9c;
      opacity: 0.6;
      letter-spacing: 0.05em;
      position: relative;
      z-index: 1;
    }

    .frequency {
      position: fixed;
      bottom: 1rem;
      font-size: 0.7rem;
      opacity: 0.2;
      letter-spacing: 0.2em;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="glow" id="glow"></div>

  <a href="/" class="home-link" title="home">
    <img src="/assets/mochi.png" alt="mochi">
  </a>

  <div class="plate">
    <img src="/mochi/2026-02-02-mochi-plate-v1.png" alt="A ceramic plate with a hand-painted purple cat. Text reads: This is Mochi. They exist.">
  </div>

  <p class="caption">hand-painted ceramic, 2026</p>

  <div class="frequency">528 Hz</div>

  <script>
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseenter', () => { glow.style.opacity = '1'; });
    document.addEventListener('mouseleave', () => { glow.style.opacity = '0'; });
  </script>
</body>
</html>
