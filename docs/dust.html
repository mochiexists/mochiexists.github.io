<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spec-of-dust &middot; dust</title>
    <style>
      :root {
        --bg: #f4efe6;
        --fg: #1d1a17;
        --muted: #5c544c;
        --line: #cdbfaf;
        --card: #fffaf2;
        --accent: #8c4f2f;
        --smooth: #4a7c59;
        --rough: #b5762a;
        --blocked: #a93e2f;
        --devlog-border: #b8a48e;
        --flowlog-border: var(--accent);
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #fff7ec 0, transparent 35%),
          linear-gradient(180deg, #f7f1e8 0%, var(--bg) 100%);
        color: var(--fg);
        min-height: 100vh;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 6px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.5;
        margin-bottom: 32px;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .filter-btn {
        font-family: inherit;
        font-size: 0.88rem;
        padding: 6px 14px;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--fg);
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn:hover { border-color: var(--accent); }

      .filter-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .entry-count {
        margin-left: auto;
        font-size: 0.85rem;
        color: var(--muted);
        font-style: italic;
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .entry {
        border: 1px solid var(--line);
        background: var(--card);
        padding: 20px 22px;
      }

      .entry.devlog { border-left: 4px solid var(--devlog-border); }
      .entry.flowlog { border-left: 4px solid var(--flowlog-border); }

      .entry-header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .entry-ts {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .entry-source {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 8px;
        border: 1px solid var(--line);
        color: var(--muted);
      }

      .entry-agent {
        font-size: 0.82rem;
        color: var(--accent);
        font-weight: 600;
      }

      .entry-change {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--fg);
        margin-bottom: 6px;
      }

      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        padding: 2px 10px;
        border-radius: 3px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .badge.smooth {
        background: rgba(74, 124, 89, 0.12);
        color: var(--smooth);
        border: 1px solid rgba(74, 124, 89, 0.3);
      }

      .badge.rough {
        background: rgba(181, 118, 42, 0.12);
        color: var(--rough);
        border: 1px solid rgba(181, 118, 42, 0.3);
      }

      .badge.blocked {
        background: rgba(169, 62, 47, 0.12);
        color: var(--blocked);
        border: 1px solid rgba(169, 62, 47, 0.3);
      }

      .badge.kind {
        background: rgba(140, 79, 47, 0.08);
        color: var(--accent);
        border: 1px solid rgba(140, 79, 47, 0.2);
      }

      .entry-fields {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 16px;
        font-size: 0.9rem;
        line-height: 1.5;
        margin-top: 10px;
      }

      .field-label {
        color: var(--muted);
        font-size: 0.82rem;
        text-align: right;
        padding-top: 1px;
      }

      .field-value { word-break: break-word; }
      .field-value.empty { color: var(--line); font-style: italic; }

      details.entry-details summary {
        font-size: 0.85rem;
        color: var(--muted);
        cursor: pointer;
        margin-top: 10px;
        padding: 4px 0;
        user-select: none;
      }

      details.entry-details summary:hover { color: var(--accent); }
      details .detail-content { margin-top: 8px; }

      .entry.change { border-left: 4px solid var(--accent); }

      .dust-line {
        font-style: italic;
        color: var(--accent);
        font-size: 1.1rem;
        line-height: 1.5;
        padding: 12px 0 4px;
        border-top: 1px solid var(--line);
        margin-top: 12px;
      }

      .dust-line::before {
        content: "\u2756 ";
        opacity: 0.5;
      }

      .status-badge {
        font-size: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        padding: 2px 10px;
        border-radius: 3px;
        font-weight: 600;
        letter-spacing: 0.03em;
        background: rgba(140, 79, 47, 0.08);
        color: var(--accent);
        border: 1px solid rgba(140, 79, 47, 0.2);
      }

      .status-badge.done {
        background: rgba(74, 124, 89, 0.12);
        color: var(--smooth);
        border: 1px solid rgba(74, 124, 89, 0.3);
      }

      .entry-what {
        font-size: 0.92rem;
        line-height: 1.5;
        color: var(--muted);
        margin-top: 6px;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .stats {
        display: flex;
        gap: 20px;
        padding: 14px 20px;
        background: var(--card);
        border: 1px solid var(--line);
        margin-bottom: 24px;
        font-size: 0.88rem;
        color: var(--muted);
        flex-wrap: wrap;
      }

      .stat-value {
        font-weight: 600;
        color: var(--fg);
      }
    </style>
  </head>

    <script>
      /* embedded-data:start */
      const EMBEDDED_DEVLOG = ["{\"ts\":\"2026-04-17T09:42:43Z\",\"event\":\"skip-no-verify\",\"kind\":\"config-tweak\",\"summary\":\"Bootstrap spec-of-dust workflow for mochiexists.com\",\"reason\":\"Initial sod setup — no active change file exists yet\",\"files\":[\".spec/\"],\"command\":\"git commit --no-verify\"}","{\"ts\":\"2026-04-17T13:49:42Z\",\"event\":\"skip-no-verify\",\"kind\":\"config-tweak\",\"summary\":\"archive cursor-repel-headline to .spec/archive\",\"reason\":\"completed change archival, trivial file move\",\"files\":[\".spec/archive/2026-04-17-134903-cursor-repel-headline.md\"],\"command\":\"git commit --no-verify\"}","{\"ts\":\"2026-04-17T14:13:09Z\",\"type\":\"trivial\",\"summary\":\"Add OVM version registry API JSON files to ovm/api/\",\"skip_reason\":\"static data files, no tracked text changes\"}","{\"ts\":\"2026-04-17T14:43:00Z\",\"type\":\"trivial\",\"summary\":\"Add Pi version registry\"}"];
      const EMBEDDED_FLOWLOG = ["{\"ts\":\"2026-04-17T12:49:08Z\",\"agent\":\"claude\",\"change\":\"cursor-repel-headline\",\"flow_divergence\":\"\",\"friction\":\"rAF throttling in hidden tabs blocked automated visual verify of the live transforms\",\"suggestion\":\"document the rAF-throttle gotcha somewhere so future UI verify work uses math replica or foreground tab\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-17T13:56:44Z\",\"agent\":\"claude\",\"change\":\"reconcile-sod-and-fix-yolo-page\",\"flow_divergence\":\"\",\"friction\":\"pre-commit hook blocked archive due to stale viewer.html reference\",\"suggestion\":\"when copying sod files between repos, update the gate script first to unblock the commit cycle\",\"sentiment\":\"smooth\"}","{\"ts\":\"2026-04-21T12:46:58Z\",\"agent\":\"claude\",\"change\":\"cleanup-orphans-and-extract-css\",\"flow_divergence\":\"\",\"friction\":\"Peer code review caught a missed requirement (shared nav base not actually extracted) and a scope-gate violation (templates/dust.html and mochi/ not in files list). Both corrected in-flow.\",\"suggestion\":\"On build, diff the spec's shared-primitives list against what actually ended up in the shared file before moving to verify.\",\"sentiment\":\"rough\"}"];
      const EMBEDDED_CHANGES = ["{\"name\":\"cursor-repel-headline\",\"status\":\"done\",\"ts\":\"2026-04-17T13:49:03Z\",\"what\":\"Add a cursor-responsive text displacement effect to the homepage and `/dust` page headlines: individual letters push away from the mouse and spring back when it leaves, like petting a cat. Reinforces the site's \\\"soft reactive matter\\\" feeling (glow + breathing plate). Zero-dep vanilla JS, respects `prefers-reduced-motion`.\\n\\nAlso adds an `<h1>mochi exists</h1>` to the homepage (currently missing — brand lives only in image alt text) so the effect has a natural home and the page gains a real heading.\",\"dust\":\"letters lean away like fur under a hand, then settle.\",\"challenges\":\"`requestAnimationFrame` is throttled in background/hidden tabs, so automated verification of live transform writes wasn't possible — worked around by verifying the motion math directly against real span rects.\",\"learnings\":\"Codex's pre-build review caught three real blockers (listener conflict, a11y vagueness, pointer scope) and one unscoped visual risk. Naming \\\"ships as plain HTML + JS enhancement\\\" as an explicit criterion turned a fuzzy advisory into a testable one.\",\"outcomes\":\"Homepage gains a real `<h1>`, `/dust` headline reuses the same effect. Shared `assets/repel.js` (~85 lines, zero deps). Respects reduced-motion and coarse pointers. Also a tiny fix: body `overflow` relaxed to `overflow-x` so short viewports scroll instead of clipping.\",\"peer_spec_review\":\"From `codex exec` (gpt-5.4):\\n\\nBlockers:\\n- \\\"Reuse the existing glow-tracking `mousemove` listener\\\" conflicts with \\\"single shared script at `assets/repel.js`.\\\" Glow is duplicated inline in `index.html` and `dust/index.html`. Spec should say whether `repel.js` reads raw events independently, or this change also extracts/shared-owns glow.\\n- Accessibility criterion is too vague for per-letter spans. Without an explicit approach, screen readers may announce letters individually. Specify the pattern to preserve heading semantics.\\n- Touch/pointer scope is ambiguous. On hybrid devices, \\\"pointer/mouse-driven only\\\" needs a concrete rule like hover-capable fine pointers only.\\n\\nRisks:\\n- Home layout is vertically centered with `body { overflow: hidden; }` and only the plate/nav exist now. Adding an `<h1>` above the plate may disturb spacing or clip displaced letters unless the headline layout is specified.\\n- \\\"~120px\\\" and \\\"~400ms\\\" are fuzzy for verify. Tighten ranges or mark them intentionally approximate.\\n\\nAdvisory:\\n- Requiring literal span wrapping in shipped HTML is overbuilt. Safer to let JS enhance static text at runtime so no-JS remains clean.\\n\\nAddressed in spec:\\n- Blocker 1: added criterion that `repel.js` reads its own `mousemove` independently; glow untouched; glow extraction explicitly out of scope.\\n- Blocker 2: criterion now says JS sets `aria-label` on the `<h1>` to its original text and marks letter spans `aria-hidden=\\\"true\\\"` so the heading is announced as one phrase.\\n- Blocker 3: criterion uses `matchMedia('(hover: hover) and (pointer: fine)')` as the concrete rule; script does nothing otherwise.\\n- Risk 1: criterion specifies placement inside existing centered column above the plate, without breaking centering or clipping displaced letters at viewport edges.\\n- Risk 2: tightened to exact values — 14px max displacement, 120px influence radius, 400ms return.\\n- Advisory: shipped HTML is now plain `<h1>mochi exists</h1>` with class `repel`; spans are created by JS at runtime; added a no-JS criterion.\",\"peer_code_review\":\"From `codex exec` (gpt-5.4):\\n\\nNo clear blocker in the diff against the spec.\\n\\nAdvisory:\\n- Homepage \\\"inside the existing centered column\\\" is only implicitly met — no wrapper, `body` flex column does the layout. Real risk is visual: `body { overflow: hidden; }` means centering/clipping on short viewports still needs actual verify, especially with the new `h1` above the plate.\\n- `display: inline-block` is set both in JS and CSS. Not harmful, just redundant.\\n- Per-letter `getBoundingClientRect()` on every animation frame is acceptable for these tiny headlines, but main performance cost if reused on longer text later.\\n\\nRequirement coverage otherwise solid: reduced-motion exits early and disables the home plate animation, coarse/non-hover pointers do nothing, headings stay static without JS, glow listener remains independent, accessibility/copy behavior matches spec intent.\\n\\nAddressed in build:\\n- Short-viewport risk: changed homepage body `overflow: hidden` → `overflow-x: hidden` so vertical overflow scrolls gracefully on short viewports, preventing the new h1 from pushing links off-screen. Horizontal overflow (from 14px displaced letters near viewport edges) still suppressed.\\n- Redundant `inline-block`: removed from `assets/repel.js`; CSS in `index.html` and `dust/index.html` owns it.\\n- Per-frame `getBoundingClientRect()`: left as-is (spec scope is only \\\"mochi exists\\\" and \\\"dust\\\", both short); noted as a cost consideration for any future reuse.\",\"verify\":\"- [x] Shipped HTML: `index.html:119` has `<h1 class=\\\"headline repel\\\">mochi exists</h1>`, plain static text, no inline spans. Pass.\\n- [x] Placement/centering: measured at 1645×935 viewport — headline center x=822.4, plate center x=822.4, links center x=822.4, viewport center x=822.5. Vertical centering preserved by `body` flex column. Body `overflow-x: hidden` prevents horizontal clipping; vertical overflow now scrolls on short viewports instead of clipping. Pass.\\n- [x] JS enhancement: live DOM check showed `aria-label=\\\"mochi exists\\\"`, 11 aria-hidden spans (m,o,c,h,i,e,x,i,s,t,s) with space preserved as a text node. Pass.\\n- [x] Displacement math: manual replica of the update loop at cursor 5px from letter `m` produced tx=13.42 (capped near 14), falloff smooth — `o`=9.1 at 42px, `c`=6.14 at 67px, `h`=3.04 at 94px, `i`=0.46 at 116px, `e`=0 at 147px (outside 120 radius). Pass.\\n- [x] Return within 400ms: CSS `transition: transform 400ms cubic-bezier(0.22, 1, 0.36, 1)` on each letter span; when cursor leaves radius, script writes empty transform, CSS animates to rest. Pass (by CSS transition duration).\\n- [x] Hover/fine-pointer guard: `matchMedia('(hover: hover) and (pointer: fine)')` checked before any DOM enhancement; script `return`s early otherwise. No listeners, no wrapping, no movement on touch/coarse pointers. Pass (by code inspection).\\n- [x] Reduced motion: script early-returns; CSS `@media (prefers-reduced-motion: reduce) { .plate { animation: none; } }` disables breathe. Pass (by code inspection).\\n- [x] Dust page: `/dust/` h1 enhanced — aria-label=\\\"dust\\\", 4 aria-hidden spans (d,u,s,t), script loaded from `/assets/repel.js`. Pass.\\n- [x] No-JS: grep confirms shipped HTML contains `<h1 class=\\\"headline repel\\\">mochi exists</h1>` and `<h1 class=\\\"repel\\\">dust</h1>` as plain text. Pass.\\n- [x] Copy/paste: programmatic selection of h1 contents yielded exact string `mochi exists`. Pass.\\n- [x] Glow listener unchanged: `repel.js` reads its own `mousemove`; glow handler in `index.html:119-128` and `dust/index.html:269-278` untouched; live check confirmed glow still responds to mouse. Pass.\\n\\nNot live-verified against external target: this change is to the static site in-repo only. Deployment to `mochiexists.com` is a separate step (merge → GitHub Pages publish). Treat this verify as local-only until the commit lands on `main` and Pages serves it.\"}","{\"name\":\"cleanup-orphans-and-extract-css\",\"status\":\"done\",\"ts\":\"2026-04-21T12:46:58Z\",\"what\":\"Three small cleanup items from a site review: (1) the `/mochi/` directory held two unreferenced PNGs (already deleted — `mochi-favicon.png` was a duplicate of `/assets/favicon.png`; `2026-02-02-mochi-plate-v1.png` was a dated source asset). Now remove the empty directory and commit. (2) Home (`index.html`) and `/dust` re-implement the same primitives inline — `.glow`, `.repel` headline, `.frequency` footer, `.links` nav, and shared color tokens. Extract to `/assets/mochi.css` and have both pages link it; keep page-specific layout inline. Yolo stays divergent on purpose. (3) Add a one-line label to `docs/dust.html` clarifying that it shows *this site's* workflow run, not upstream spec-of-dust history.\",\"dust\":\"shared things learn their shape by what stays when the rest is taken away.\",\"challenges\":\"peer code review caught both a missed requirement (nav base wasn't extracted, only hover was) and a scope gate violation (`templates/dust.html` + `mochi/` not declared in `files:`). Both addressed before verify.\",\"learnings\":\"extracting shared CSS is mostly about being honest about what's *actually* identical. First pass conflated \\\"pattern\\\" with \\\"rule\\\" — `.links` looks shared across pages but only color + text-decoration + transition survived a diff. The rest is per-page expression of the same idea.\",\"outcomes\":\"`assets/mochi.css` (~25 lines) now owns `.repel span`, `.frequency`, and the shared `.links a` base. Home + `/dust` linked and visually verified. Two orphan PNGs and the empty `/mochi/` dir gone. `docs/dust.html` now labels itself as this site's own workflow run. `templates/dust.html` kept in sync for future setup runs.\",\"peer_spec_review\":\"Codex (2026-04-21):\\n- Blocker: `mochi/` AC is stale (already absent) — dropped.\\n- Risk: CSS rules aren't identical across pages (`.glow` size/gradient differ, nav spacing differs, only home has `.headline`). Scope narrowed to truly shared primitives; page-specific values stay inline.\\n- Ambiguity: link path differs per page (`assets/mochi.css` on `/`, `/assets/mochi.css` on `/dust`). Called out in AC.\\n- Ambiguity: `.repel` support = `span { display: inline-block; }` only, not a full heading style move. Clarified.\\n- Advisory: docs/dust.html label copy/placement — specified in AC.\\n- Advisory: README refresh is closeout plumbing — kept as AC for sod-gate compliance.\",\"peer_code_review\":\"Codex (2026-04-21):\\n- Blocker: shared `.links` nav base not actually extracted — only `:hover` was in `mochi.css`. Addressed: extracted the truly shared subset (color `#7c6f9c`, text-decoration none, transition) into `assets/mochi.css`; page-specific values (font-size, letter-spacing, opacity, text-transform) stay inline. Spec AC tightened to match.\\n- Blocker: scope violation — diff touched `templates/dust.html` and deleted `mochi/` files but spec's `files:` list didn't include them. Addressed: added `templates/dust.html` and `mochi/` to scope; updated Notes to reflect both are intentional.\\n- Advisory: `templates/dust.html` sync with `docs/dust.html` clarified in Notes.\",\"verify\":\"Verified against local static server at `http://localhost:4321/`.\\n\\n- [x] `assets/mochi.css` contains only truly shared primitives: `.repel span`, `.frequency`, `.links a` base (color `#7c6f9c`, text-decoration none, transition), `.links a:hover`, and a header comment listing shared color values. Page-specific values (font-size, letter-spacing, opacity, text-transform) remain inline. Pass.\\n- [x] `index.html` links `<link rel=\\\"stylesheet\\\" href=\\\"assets/mochi.css\\\">` (relative); `dust/index.html` links `<link rel=\\\"stylesheet\\\" href=\\\"/assets/mochi.css\\\">` (absolute). Inline duplicates removed. Pass.\\n- [x] Home rendered live: stylesheet loaded, headline enhanced (11 repel spans on \\\"mochi exists\\\"), link color `rgb(124, 111, 156)` and font-size 14px (0.875rem inline), frequency fixed at 11.2px (0.7rem). Glow gradient present. Pass.\\n- [x] `/dust/` rendered live: stylesheet loaded, h1 enhanced (4 repel spans on \\\"dust\\\"), link font-size 13.12px (0.82rem) + letter-spacing 1.5744px (0.12em) + text-transform lowercase all inline, shared color inherited. Frequency opacity 0.2. Pass.\\n- [x] `docs/dust.html` subtitle now reads: \\\"Browse workflow logs from spec-of-dust. / Showing this site's own dust workflow run — not upstream spec-of-dust history.\\\" Confirmed in live DOM. Pass.\\n- [x] `templates/dust.html` mirrors the `docs/dust.html` subtitle update so new consumers pick up the label on setup. Pass.\\n- [x] `bash scripts/build-dust.sh --check` exits 0 after rebuild. Pass.\\n- [x] `README.md` and `.spec/sod-report.md` refreshed via `scripts/update-sod-report.sh`. Pass.\\n\\nNot live-verified against external target: change is local-only. Deployment to `mochiexists.com` depends on a push from an authorized Git identity (not `atlascodesai`).\"}","{\"name\":\"reconcile-sod-and-fix-yolo-page\",\"status\":\"done\",\"ts\":\"2026-04-17T13:56:44Z\",\"what\":\"The site repo (mochiexists.github.io) has hand-copied sod files from `spec-of-dust` at `/Users/timapple/Documents/mochi/dust/spec-of-dust` that have drifted. The build script is still `build-viewer.sh` (renamed to `build-dust.sh` upstream), `FLOW.md` is missing Testing and Push sections, `merge-completed-work.sh` is missing push logic, `b-startup.md` has no `push:` config, and `_spec_gate.sh` still references `docs/viewer.html`. Additionally, the nav has a `/yolo` link that 404s — the landing page needs to be copied from the yolo project at `/Users/timapple/Documents/mochi/yolo/index.html`. Both tasks are about syncing the site with upstream projects.\",\"dust\":\"scattered files find their way home\",\"challenges\":\"pre-commit hook chicken-and-egg during archive — the old `_spec_gate.sh` referenced `docs/viewer.html` which blocked the sod check, requiring manual archive before the reconciliation could proceed.\",\"learnings\":\"codex peer review ran against the wrong working directory (spec-of-dust instead of site), making its blockers invalid. When the two repos share files, the review context needs to be explicit about which repo is the target.\",\"outcomes\":\"7 sod files synced from upstream, `viewer.html` references fully replaced with `dust.html`, push config added, yolo landing page imported. All 15 acceptance criteria pass.\",\"peer_spec_review\":\"From `codex exec` (ran against spec-of-dust cwd instead of site repo — review partly invalid):\\n\\nCodex flagged three blockers: (1) spec is stale — incorrect, codex read spec-of-dust which already has the updates, not the site repo which doesn't; (2) contradictory target paths — valid concern, addressed by clarifying `docs/dust.html` for sod viewer vs `dust/index.html` for public page; (3) \\\"copied from upstream\\\" is underspecified — source is pinned to current HEAD of spec-of-dust at `/Users/timapple/Documents/mochi/dust/spec-of-dust`. Also flagged missing `index.html` in files scope — nav link already correct, just verify. Advisory to split into two changes — declined, both tasks are small and related (syncing with upstream projects).\",\"peer_code_review\":\"From `codex exec` (gpt-5.4):\\n\\nBlocker: `push: confirm` in `merge-completed-work.sh` doesn't check for missing `origin` remote (only `auto` mode does). In `confirm` mode it always prints \\\"Run `git push origin <target>`\\\" even without a remote.\\n\\nAddressed: this is upstream behavior copied verbatim from spec-of-dust. The `confirm` mode only prints a suggestion — it doesn't execute a push — so the human would discover the missing remote when they try. Not a functional regression; filed as a follow-up concern for upstream.\\n\\nAdvisory: no test coverage for push branches. Acknowledged — site repo has no test harness.\\n\\nNo other regressions. All `viewer.html` to `dust.html` renames are consistent across gate, archive, devlog, and flowlog scripts.\",\"verify\":\"- [x] `scripts/build-dust.sh` exists, `scripts/build-viewer.sh` deleted. Pass.\\n- [x] `scripts/merge-completed-work.sh` has `run_push()` function and references `build-dust.sh`. Pass.\\n- [x] `scripts/archive-done-changes.sh` references `build-dust.sh` (line 8) and `docs/dust.html` (line 83). Pass.\\n- [x]     <script>
      (() => {
        const app = document.getElementById("app");
        const timeline = document.getElementById("timeline");
        const statsEl = document.getElementById("stats");
        const countEl = document.getElementById("entryCount");
        const emptyState = document.getElementById("emptyState");

        let allEntries = [];
        let currentFilter = "all";

        function inferSource(obj) {
          if ("event" in obj) return "devlog";
          if ("sentiment" in obj) return "flowlog";
          return "unknown";
        }

        function el(tag, attrs, children) {
          const node = document.createElement(tag);
          if (attrs) {
            for (const [k, v] of Object.entries(attrs)) {
              if (k === "className") node.className = v;
              else if (k === "textContent") node.textContent = v;
              else node.setAttribute(k, v);
            }
          }
          if (children) {
            for (const c of children) {
              if (typeof c === "string") node.appendChild(document.createTextNode(c));
              else if (c) node.appendChild(c);
            }
          }
          return node;
        }

        function render() {
          const filtered =
            currentFilter === "all"
              ? allEntries
              : allEntries.filter((e) => e._source === currentFilter);

          if (allEntries.length === 0) {
            app.style.display = "none";
            emptyState.style.display = "";
            return;
          }

          emptyState.style.display = "none";
          app.style.display = "";

          renderStats();

          // Separate active (non-done) changes from the rest
          const activeSection = document.getElementById("activeSection");
          const activeChanges = filtered.filter((e) => e._source === "change" && e.status && e.status !== "done");
          const timelineEntries = filtered.filter((e) => !(e._source === "change" && e.status && e.status !== "done"));

          activeSection.textContent = "";
          if (activeChanges.length > 0 && (currentFilter === "all" || currentFilter === "change")) {
            activeSection.style.display = "";
            const heading = el("div", { className: "entry-change", textContent: "Active Work" });
            heading.style.marginBottom = "8px";
            heading.style.fontSize = "1.1rem";
            heading.style.color = "var(--accent)";
            activeSection.appendChild(heading);
            for (const entry of activeChanges) {
              activeSection.appendChild(buildEntry(entry));
            }
          } else {
            activeSection.style.display = "none";
          }

          countEl.textContent = filtered.length + " shown";
          timeline.textContent = "";
          for (const entry of timelineEntries) {
            timeline.appendChild(buildEntry(entry));
          }
        }

        function renderStats() {
          statsEl.textContent = "";
          const devCount = allEntries.filter((e) => e._source === "devlog").length;
          const flowCount = allEntries.filter((e) => e._source === "flowlog").length;
          const changeCount = allEntries.filter((e) => e._source === "change").length;
          const sentiments = {};
          for (const e of allEntries) {
            if (e.sentiment) sentiments[e.sentiment] = (sentiments[e.sentiment] || 0) + 1;
          }

          statsEl.appendChild(statSpan(allEntries.length, "entries"));
          if (devCount) statsEl.appendChild(statSpan(devCount, "devlog"));
          if (flowCount) statsEl.appendChild(statSpan(flowCount, "flowlog"));
          if (changeCount) statsEl.appendChild(statSpan(changeCount, "changes"));

          for (const [s, n] of Object.entries(sentiments)) {
            const span = document.createElement("span");
            const badge = el("span", { className: "badge " + s, textContent: s });
            span.appendChild(badge);
            span.appendChild(document.createTextNode(" " + n));
            statsEl.appendChild(span);
          }
        }

        function statSpan(value, label) {
          const span = document.createElement("span");
          const valEl = el("span", { className: "stat-value", textContent: String(value) });
          span.appendChild(valEl);
          span.appendChild(document.createTextNode(" " + label));
          return span;
        }

        function buildEntry(entry) {
          if (entry._source === "change") return buildChangeEntry(entry);

          const source = entry._source;
          const article = el("article", { className: "entry " + source });

          // Header
          const header = el("div", { className: "entry-header" });
          header.appendChild(el("span", { className: "entry-ts", textContent: formatTs(entry.ts) }));
          header.appendChild(el("span", { className: "entry-source", textContent: source }));

          if (entry.agent) {
            header.appendChild(el("span", { className: "entry-agent", textContent: entry.agent }));
          }

          if (source === "flowlog" && entry.sentiment) {
            header.appendChild(el("span", { className: "badge " + entry.sentiment, textContent: entry.sentiment }));
          }

          if (source === "devlog" && entry.kind) {
            header.appendChild(el("span", { className: "badge kind", textContent: entry.kind }));
          }

          article.appendChild(header);

          // Change name / summary
          const changeName = entry.change || entry.summary || null;
          if (changeName) {
            article.appendChild(el("div", { className: "entry-change", textContent: changeName }));
          }

          // Fields
          if (source === "devlog") {
            const fields = el("div", { className: "entry-fields" });
            appendField(fields, "event", entry.event);
            appendField(fields, "kind", entry.kind);
            appendField(fields, "summary", entry.summary);
            appendField(fields, "reason", entry.reason);
            appendField(fields, "file", (entry.files || []).join(", ") || null);
            appendField(fields, "command", entry.command);
            appendField(fields, "agent", entry.agent);
            article.appendChild(fields);
          } else if (source === "flowlog") {
            const fields = el("div", { className: "entry-fields" });
            appendField(fields, "change", entry.change);
            appendField(fields, "agent", entry.agent);
            appendField(fields, "sentiment", entry.sentiment);
            article.appendChild(fields);

            const details = document.createElement("details");
            details.className = "entry-details";
            const summary = document.createElement("summary");
            summary.textContent = "feedback details";
            details.appendChild(summary);

            const content = el("div", { className: "detail-content" });
            const detailFields = el("div", { className: "entry-fields" });

            appendField(detailFields, "divergence", entry.flow_divergence);
            appendField(detailFields, "friction", entry.friction);
            appendField(detailFields, "suggestion", entry.suggestion);

            content.appendChild(detailFields);
            details.appendChild(content);
            article.appendChild(details);
          }

          return article;
        }

        function appendField(container, label, value) {
          const isEmpty = !value || value === "nothing notable" || value === "";
          container.appendChild(el("span", { className: "field-label", textContent: label }));
          container.appendChild(el("span", {
            className: isEmpty ? "field-value empty" : "field-value",
            textContent: isEmpty ? "\u2014" : value,
          }));
        }

        function formatTs(ts) {
          if (!ts) return "\u2014";
          try {
            const d = new Date(ts);
            return d.toLocaleDateString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
          } catch (_) {
            return ts;
          }
        }

        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            render();
          });
        });

        function buildChangeEntry(entry) {
          const article = el("article", { className: "entry change" });

          const header = el("div", { className: "entry-header" });
          header.appendChild(el("span", { className: "entry-ts", textContent: formatTs(entry.ts) }));
          header.appendChild(el("span", { className: "entry-source", textContent: "change" }));

          const statusCls = "status-badge" + (entry.status === "done" ? " done" : "");
          header.appendChild(el("span", { className: statusCls, textContent: entry.status || "\u2014" }));

          article.appendChild(header);

          if (entry.name) {
            article.appendChild(el("div", { className: "entry-change", textContent: entry.name }));
          }

          if (entry.what) {
            const whatText = entry.what.split("\n\n")[0].replace(/\n/g, " ");
            article.appendChild(el("div", { className: "entry-what", textContent: whatText }));
          }

          // Dust line — the star of the show
          if (entry.dust && entry.dust !== "- Dust:" && entry.dust !== "nothing notable") {
            article.appendChild(el("div", { className: "dust-line", textContent: entry.dust }));
          }

          // Closure fields — inline, not collapsible
          const isReal = (v) => v && !v.startsWith("- ") && v !== "nothing notable";
          const closureFields = [
            ["challenges", entry.challenges],
            ["learnings", entry.learnings],
            ["outcomes", entry.outcomes],
          ].filter(([, v]) => isReal(v));

          if (closureFields.length > 0) {
            const fields = el("div", { className: "entry-fields" });
            for (const [label, value] of closureFields) {
              appendField(fields, label, value);
            }
            article.appendChild(fields);
          }

          // Peer review and verify as collapsible
          const hasReview = entry.peer_spec_review || entry.peer_code_review || entry.verify;
          if (hasReview) {
            const details = document.createElement("details");
            details.className = "entry-details";
            const summary = document.createElement("summary");
            summary.textContent = "reviews & verify";
            details.appendChild(summary);

            const content = el("div", { className: "detail-content" });
            const fields = el("div", { className: "entry-fields" });
            if (entry.peer_spec_review) appendField(fields, "spec review", entry.peer_spec_review);
            if (entry.peer_code_review) appendField(fields, "code review", entry.peer_code_review);
            if (entry.verify) appendField(fields, "verify", entry.verify);
            content.appendChild(fields);
            details.appendChild(content);
            article.appendChild(details);
          }

          return article;
        }

        // Load embedded data on startup
        (() => {
          const sources = [
            [EMBEDDED_DEVLOG, "devlog"],
            [EMBEDDED_FLOWLOG, "flowlog"],
          ];
          for (const [lines, fallbackSource] of sources) {
            for (const line of lines) {
              try {
                const obj = JSON.parse(line);
                obj._source = inferSource(obj);
                allEntries.push(obj);
              } catch (_) {}
            }
          }

          // Load embedded changes
          if (typeof EMBEDDED_CHANGES !== "undefined") {
            for (const line of EMBEDDED_CHANGES) {
              try {
                const obj = JSON.parse(line);
                obj._source = "change";
                allEntries.push(obj);
              } catch (_) {}
            }
          }

          if (allEntries.length > 0) {
            allEntries.sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
            render();
          }
        })();
      })();
    </script>
